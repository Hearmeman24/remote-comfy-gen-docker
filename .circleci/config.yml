# .circleci/config.yml — SETUP config for dynamic config.
# The setup workflow fetches the blockflow-presets manifest, generates the real
# pipeline config (with the smoke_test matrix expanded from the live preset list),
# and uses the circleci/continuation orb to trigger it. The continuation config
# (see generate_continue.py) builds + pushes the docker image, rolls the endpoint
# over, waits for the rollout, runs the smoke matrix, then notifies.
#
# Why dynamic: matrix-per-preset must be expanded at pipeline time so each preset
# runs as its own job (rerun-from-failed reruns only the failed preset, not the
# image build). The preset list comes from the registry's manifest.json so we
# don't have to hardcode it here.

version: 2.1
setup: true

orbs:
  continuation: circleci/continuation@1.0.0

jobs:
  setup:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Generate continuation config
          command: |
            python3 .circleci/generate_continue.py > /tmp/continue.yml
            echo "--- generated continue.yml (first 80 lines) ---"
            head -80 /tmp/continue.yml
      - continuation/continue:
          configuration_path: /tmp/continue.yml

workflows:
  setup:
    jobs:
      - setup:
          filters:
            tags:
              # Match both worker tags (vN) and installer tags (installer-vN).
              # The continuation YAML routes each to the right workflow via its
              # own tag filter — see generate_continue.py.
              only: /^(installer-)?v.*$/
            branches:
              ignore: /.*/
